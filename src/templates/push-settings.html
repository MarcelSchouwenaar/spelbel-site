<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{APP_NAME}} – Meldingsinstellingen</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { max-width: 480px; margin: 0 auto; padding: 32px 20px; font-family: -apple-system, sans-serif; }
    .logo { margin-bottom: 24px; }
    .logo img { height: 40px; }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    .sub { color: #666; font-size: .9rem; margin-bottom: 28px; }
    .card { background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 1rem; margin: 0 0 16px; }
    .bell-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .bell-row:last-child { border-bottom: none; }
    .bell-name { font-weight: 600; }
    .bell-loc { font-size: .8rem; color: #888; }
    .btn-small { background: #fee2e2; color: #c53030; border: none; border-radius: 6px; padding: 6px 12px; font-size: .85rem; cursor: pointer; }
    .btn-snooze { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 11px 20px; font-size: .9rem; cursor: pointer; width: 100%; margin-bottom: 8px; }
    .btn-snooze-day { background: #4f46e5; }
    .btn-unsub-all { background: #fff; color: #c53030; border: 1px solid #fca5a5; border-radius: 8px; padding: 11px 20px; font-size: .9rem; cursor: pointer; width: 100%; margin-top: 8px; }
    .snooze-active { background: #fef3c7; border-color: #fcd34d; color: #92400e; border-radius: 8px; padding: 10px 14px; font-size: .9rem; margin-bottom: 12px; }
    .msg { border-radius: 8px; padding: 10px 14px; font-size: .9rem; margin-top: 12px; display: none; }
    .msg-ok  { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .msg-err { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }
    #no-token, #loading { text-align: center; padding: 60px 0; color: #888; }
  </style>
</head>
<body>
  <div class="logo"><img src="/images/logo.svg" alt="{{APP_NAME}}"></div>
  <h1>Meldingsinstellingen</h1>
  <p class="sub">Beheer je browsermeldingen voor Spelbel op dit apparaat.</p>

  <div id="loading">Laden…</div>
  <div id="no-token" style="display:none">
    <p>Geen abonnement gevonden op dit apparaat.</p>
    <p style="font-size:.9rem">Meld je aan via de QR-code bij een Spelbel.</p>
  </div>

  <div id="content" style="display:none">
    <div id="snooze-active" class="snooze-active" style="display:none"></div>

    <div class="card">
      <h2>Mijn Spelbellen</h2>
      <div id="bells-list"></div>
    </div>

    <div class="card">
      <h2>Meldingen pauzeren</h2>
      <button class="btn-snooze" onclick="doSnooze('2h')">⏰ Snooze (2 uur)</button>
      <button class="btn-snooze btn-snooze-day" onclick="doSnooze('day')">🌙 Snooze (rest van de dag)</button>
    </div>

    <button class="btn-unsub-all" onclick="unsubscribeAll()">🔕 Alle meldingen uitschakelen op dit apparaat</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const TOKEN_KEY = 'spelbel_push_token';
    let token = localStorage.getItem(TOKEN_KEY);

    function showMsg(text, ok) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
      el.style.display = '';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function load() {
      document.getElementById('loading').style.display = 'none';
      if (!token) { document.getElementById('no-token').style.display = ''; return; }

      const res = await fetch('{{APP_URL}}/webhook/push/settings?token=' + encodeURIComponent(token));
      if (!res.ok) { document.getElementById('no-token').style.display = ''; localStorage.removeItem(TOKEN_KEY); return; }

      const data = await res.json();
      document.getElementById('content').style.display = '';

      // Snooze banner
      if (data.snoozedUntil) {
        const time = new Date(data.snoozedUntil).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
        const el = document.getElementById('snooze-active');
        el.textContent = `⏰ Meldingen gepauzeerd tot ${time}.`;
        el.style.display = '';
      }

      // Bell list
      const list = document.getElementById('bells-list');
      if (!data.doorbells.length) {
        list.innerHTML = '<p style="color:#888;font-size:.9rem">Je bent niet aangemeld voor een specifieke Spelbel.</p>';
      } else {
        list.innerHTML = data.doorbells.map(b => `
          <div class="bell-row">
            <div>
              <div class="bell-name">🔔 ${esc(b.name)}</div>
              ${b.location ? `<div class="bell-loc">📍 ${esc(b.location)}</div>` : ''}
            </div>
            <button class="btn-small" onclick="removeBell('${b.id}', this)">Afmelden</button>
          </div>`).join('');
      }
    }

    async function doSnooze(duration) {
      const res = await fetch('{{APP_URL}}/webhook/push/snooze', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, duration }),
      });
      if (res.ok) {
        const data = await res.json();
        const time = new Date(data.until).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
        const el = document.getElementById('snooze-active');
        el.textContent = `⏰ Meldingen gepauzeerd tot ${time}.`;
        el.style.display = '';
        showMsg('✅ Gesnoozed!', true);
      } else {
        showMsg('❌ Er is iets misgegaan.', false);
      }
    }

    async function removeBell(doorbellId, btn) {
      if (!confirm('Afmelden voor deze Spelbel?')) return;
      btn.disabled = true;
      const res = await fetch('{{APP_URL}}/webhook/push/doorbell', {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, doorbellId }),
      });
      if (res.ok) { btn.closest('.bell-row').remove(); showMsg('✅ Afgemeld.', true); }
      else { btn.disabled = false; showMsg('❌ Er is iets misgegaan.', false); }
    }

    async function unsubscribeAll() {
      if (!confirm('Alle browsermeldingen van Spelbel uitschakelen op dit apparaat?')) return;
      const reg = await navigator.serviceWorker.getRegistration('/sw.js').catch(() => null);
      const sub = reg ? await reg.pushManager.getSubscription() : null;
      if (sub) await sub.unsubscribe();
      await fetch('{{APP_URL}}/webhook/push/device', {
        method: 'DELETE', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      localStorage.removeItem(TOKEN_KEY);
      document.getElementById('content').style.display = 'none';
      document.getElementById('no-token').style.display = '';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    load();
  </script>
</body>
</html>
